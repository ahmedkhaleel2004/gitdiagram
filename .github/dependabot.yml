version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    labels:
      - "dependencies"

updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "bun"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Toronto"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    groups:
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
