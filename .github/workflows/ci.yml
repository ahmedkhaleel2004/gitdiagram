name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun ci
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun run test
      - name: Build
        run: bun run build
      - name: Performance budgets
        run: bun run perf:budget
